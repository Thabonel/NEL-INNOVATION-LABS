    <!-- Schema Markup: FAQPage (matching visible FAQ section) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What does NEL Innovation Labs actually build?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We build production AI systems — not prototypes, not proofs of concept. Recent examples include an AI financial guardian that monitors construction job costs via SMS (Tradie Shield), a full-stack AI product platform (AI Query Hub), and an intelligent e-commerce system for an expedition vehicle manufacturer (Beyond RV). Every system we deliver runs in production serving real users."
          }
        },
        {
          "@type": "Question",
          "name": "Who does NEL work with?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We work with businesses, startups, and enterprises that need custom AI development, complex system architecture, or full-stack AI product development. Our clients are typically in media, automotive, construction, fashion, education, or marketing. We are based in Sydney, Australia and serve clients both locally and internationally."
          }
        },
        {
          "@type": "Question",
          "name": "How is NEL different from an AI consultant or agency?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We do not write strategy documents and hand them over. NEL is a development studio — we design, code, deploy, and support the systems ourselves. Consultants deliver slides. We deliver working software in production with measurable outcomes."
          }
        },
        {
          "@type": "Question",
          "name": "How much does a project typically cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Every project is scoped individually. Pricing depends on complexity, timeline, and technical requirements. We provide a fixed-price proposal after an initial consultation. Typical engagements range from $50k to $250k+."
          }
        },
        {
          "@type": "Question",
          "name": "What technologies does NEL use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We select the best technology for each project. Our stack typically includes React, TypeScript, Fastify, Supabase (PostgreSQL), OpenAI GPT, Twilio, Vite, and Tailwind CSS. We deploy on Netlify, Render, and Vercel."
          }
        },
        {
          "@type": "Question",
          "name": "How long does a project take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Timelines vary by scope. A specialised AI agent can take 4–8 weeks. A full-stack product platform typically runs 12–20 weeks. We provide a detailed timeline during project scoping."
          }
        },
        {
          "@type": "Question",
          "name": "Do you work with clients outside Australia?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. While we are based in Sydney, Australia, we work with clients globally. Our standard engagement model works fully remotely with regular video check-ins and milestone deliveries."
          }
        },
        {
          "@type": "Question",
          "name": "What happens after the project is delivered?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We provide a post-launch support period, handover documentation, and ongoing maintenance options. Every system is built to be operated by your team, with appropriate monitoring and support in place."
          }
        }
      ]
    }
    </script>

  <body>
    <!-- Hidden form for Netlify Forms detection at build time -->
    <form name="contact" method="post" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="companyName" />
      <input type="email" name="email" />
      <textarea name="aiChallenge"></textarea>
      <select name="timeline">
        <option value="asap">ASAP (1-3 months)</option>
        <option value="near-term">Near-term (3-6 months)</option>
        <option value="planned">Planned (6-12 months)</option>
        <option value="exploring">Just exploring</option>
      </select>
      <select name="budget">
        <option value="under-50k">Under $50k</option>
        <option value="50k-100k">$50k - $100k</option>
        <option value="100k-250k">$100k - $250k</option>
        <option value="250k-plus">$250k+</option>
        <option value="discuss">Let's discuss</option>
      </select>
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
