    <!-- Schema Markup -->

    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "NEL Innovation Labs",
      "url": "https://nelinnovationlabs.com",
      "logo": "https://nelinnovationlabs.com/logo.png",
      "description": "AI development studio building production-ready AI systems for businesses",
      "foundingDate": "2024",
      "sameAs": [
        "https://github.com/Thabonel/NEL-INNOVATION-LABS"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "info@nelinnovationlabs.com",
        "contactType": "customer service"
      },

        "@type": "PostalAddress",
        "addressLocality": "Sydney",
        "addressRegion": "NSW",
        "addressCountry": "AU"
      }
    }

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "NEL Innovation Labs AI Development Services",
      "applicationCategory": "AI Development Platform",
      "operatingSystem": "Web",
      "description": "Custom AI development, strategy, and full-stack AI platform development services",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "AUD",
        "description": "Custom pricing based on project scope"
      },
      "provider": {
        "@type": "Organization",
        "name": "NEL Innovation Labs"
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is NEL Innovation Labs?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEL Innovation Labs is an AI development studio that builds production-ready AI systems for businesses. We focus on custom AI development, strategy & architecture, and full-stack AI product development."
          }
        },
        {
          "@type": "Question",
          "name": "How much does NEL Innovation Labs cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEL provides custom project pricing based on scope and technical requirements. Contact us for consultation and project scoping."
          }
        },
        {
          "@type": "Question",
          "name": "What does NEL Innovation Labs integrate with?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEL integrates with Supabase, OpenAI, Claude, Gemini, React/Next.js, Laravel/Livewire, and other modern development frameworks."
          }
        },
        {
          "@type": "Question",
          "name": "Who is NEL Innovation Labs for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEL serves businesses, startups, and enterprises requiring custom AI development, complex system architecture, or full-stack AI product development."
          }
        },
        {
          "@type": "Question",
          "name": "How does NEL Innovation Labs compare to other AI consultants?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEL focuses on building and shipping production systems rather than consulting, with demonstrated results like 95% accuracy systems and 50+ agent orchestrations."
          }
        },
        {
          "@type": "Question",
          "name": "Is NEL Innovation Labs available in Australia?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, NEL is based in Sydney, Australia and serves Australian and international clients."
          }
        },
        {
          "@type": "Question",
          "name": "What AI models does NEL Innovation Labs use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEL uses multiple AI models including OpenAI (GPT, Whisper), Claude (Opus 4.6), and Gemini (1.5 Pro) in integrated systems."
          }
        },
        {
          "@type": "Question",
          "name": "What industries has NEL Innovation Labs worked with?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEL has delivered systems for media/broadcasting, automotive, fashion, trade services, education, and marketing industries."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <!-- Hidden form for Netlify Forms detection at build time -->
    <form name="contact" method="post" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="companyName" />
      <input type="email" name="email" />
      <textarea name="aiChallenge"></textarea>
      <select name="timeline">
        <option value="asap">ASAP (1-3 months)</option>
        <option value="near-term">Near-term (3-6 months)</option>
        <option value="planned">Planned (6-12 months)</option>
        <option value="exploring">Just exploring</option>
      </select>
      <select name="budget">
        <option value="under-50k">Under $50k</option>
        <option value="50k-100k">$50k - $100k</option>
        <option value="100k-250k">$100k - $250k</option>
        <option value="250k-plus">$250k+</option>
        <option value="discuss">Let's discuss</option>
      </select>
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
